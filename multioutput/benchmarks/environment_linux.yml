name: mogp-waveome-sim
# Linux (x86_64) environment spec. Swap tensorflow-macos for tensorflow vs. the macOS version.
# R packages are not conda-managed — install separately via: Rscript install_r_deps.R
channels:
  - conda-forge
dependencies:
  - python=3.11
  - r-base=4.5
  - rpy2=3.6.4
  - pandas=2.3
  - scipy=1.16
  - pip:
    - numpy==1.26.4

    # GP / MOGP (waveome installed separately in setup_hpc.sh — git URLs
    # cause CondaValueError in some conda versions)
    - gpflow==2.9.1
    - tensorflow-probability==0.23.0
    # Linux x86_64 (CPU or CUDA):
    - tensorflow==2.15.0
    # For GPU nodes, also install: tensorflow[and-cuda]==2.15.0
    # or set up CUDA separately — TF will use GPU automatically if CUDA is available.

    # Comparison methods (Python-based)
    - pywgcna==2.2.1
    - mofapy2==0.7.2
    - muon==0.1.7
    - anndata==0.12.7
    - scanpy==1.11.5
    - gseapy==1.1.11

    # Analysis / utilities
    - statsmodels==0.14.6
    - scikit-learn==1.8.0
    - joblib==1.5.3
    - matplotlib==3.10.8
    - seaborn==0.13.2
    - tqdm==4.67.1
