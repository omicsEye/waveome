name: mogp-waveome-sim
# Curated cross-platform spec. Tested on macOS ARM64 (Apple Silicon).
# On Linux, replace tensorflow-macos with tensorflow (see pip section below).
channels:
  - conda-forge
dependencies:
  - python=3.11
  - r-base=4.5        # R runtime — R packages installed separately via install_r_deps.R
  - rpy2=3.6.4        # Python-R bridge
  - pandas=2.3
  - scipy=1.16
  - pip:
    # Pinned: numpy 1.26.x required by tensorflow 2.15 / gpflow 2.9
    - numpy==1.26.4

    # GP / MOGP (waveome)
    - gpflow==2.9.1
    - tensorflow-probability==0.23.0
    - git+https://github.com/omicsEye/waveome.git@multioutput_benchmarking
    # macOS ARM64:
    - tensorflow-macos==2.15.1
    # Linux / Intel Mac — uncomment and remove tensorflow-macos above:
    # - tensorflow==2.15.0

    # Comparison methods (Python-based)
    - pywgcna==2.2.1        # WGCNA
    - mofapy2==0.7.2        # MEFISTO / MOFA+
    - muon==0.1.7
    - anndata==0.12.7
    - scanpy==1.11.5
    - gseapy==1.1.11        # LMM-GSEA

    # Analysis / utilities
    - statsmodels==0.14.6
    - scikit-learn==1.8.0
    - joblib==1.5.3
    - matplotlib==3.10.8
    - seaborn==0.13.2
    - tqdm==4.67.1
